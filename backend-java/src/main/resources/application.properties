spring.application.name=backend-java

server.port=8081

# Database Settings (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/medicalai
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Connect to Python ML Microservice
python.ml.service.url=http://localhost:8000/api

# Spring AI using Groq / Llama 3 via OpenAI-compatible endpoint format
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# Connection timeout settings for slow Python operations
spring.http.client.connect-timeout=30s
spring.http.client.read-timeout=30s

# -- Email Notification (Gmail SMTP) --
# Replace with your real Gmail + App Password before going live
# App Password: Google Account -> Security -> 2-Step Verification -> App Passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=yeminenimmk@gmail.com
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# -- Async email threading --
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
