<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Login | Agentic Medical AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="antialiased min-h-screen relative flex flex-col items-center justify-center p-4">

    <div class="glass-premium p-8 rounded-2xl w-full max-w-md animate-slide-up shadow-[0_0_50px_rgba(45,212,191,0.1)] relative overflow-hidden">
        
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-teal-500/20 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-indigo-500/20 rounded-full blur-3xl"></div>

        <div class="flex justify-center mb-6 relative z-10">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-teal-400 to-blue-500 flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-earth-asia text-white text-3xl"></i>
            </div>
        </div>
        
        <h2 class="text-3xl font-bold tracking-tight text-center mb-2 relative z-10 text-white">Agentic<span class="text-gradient hover:text-teal-400 transition-colors">Med</span> AI</h2>
        <p class="text-slate-400 text-center mb-8 relative z-10">Secure Patient Portal Login</p>

        <form id="login-form" class="flex flex-col gap-5 relative z-10">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user text-slate-500 text-sm"></i>
                    </div>
                    <input type="text" id="login-username" required class="glass-input w-full pl-10 p-3 rounded-xl placeholder-slate-600 text-white focus:border-teal-400 transition-all outline-none" placeholder="Enter patient username">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-slate-500 text-sm"></i>
                    </div>
                    <input type="password" id="login-password" required class="glass-input w-full pl-10 p-3 rounded-xl placeholder-slate-600 text-white focus:border-teal-400 transition-all outline-none" placeholder="••••••••">
                </div>
            </div>

            <p id="error-msg" class="text-red-400 text-sm hidden font-medium text-center"><i class="fa-solid fa-circle-exclamation mr-1"></i>Invalid credentials</p>

            <button type="submit" id="btn-login" class="w-full bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-400 hover:to-emerald-400 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-teal-500/20 active:scale-[0.98] mt-2">
                Authenticate Securely <i class="fa-solid fa-arrow-right ml-2 opacity-80"></i>
            </button>
            
            <p class="text-center text-sm text-slate-400 mt-2">
                New patient? <a href="register.html" class="text-teal-400 hover:text-teal-300 font-semibold underline decoration-teal-500/30 underline-offset-4">Create Digital Twin Profile</a>
            </p>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btn-login');
            const errorMsg = document.getElementById('error-msg');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating...';
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            const payload = {
                username: document.getElementById('login-username').value,
                password: document.getElementById('login-password').value
            };

            try {
                const res = await fetch('http://localhost:8081/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('auth_username',  data.username);
                    localStorage.setItem('auth_role',      data.role      || 'PATIENT');
                    localStorage.setItem('auth_area',      data.villageOrArea || '');
                    localStorage.setItem('auth_fullname',  data.fullName  || data.username);
                    localStorage.setItem('auth_email',     data.email     || '');
                    // Role-based redirect
                    window.location.href = data.role === 'DOCTOR' ? 'doctor.html' : 'index.html';
                } else {
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorMsg.innerText = "Connection failed. Backend may be offline.";
                errorMsg.classList.remove('hidden');
            } finally {
                btn.innerHTML = 'Authenticate Securely <i class="fa-solid fa-arrow-right ml-2 opacity-80"></i>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
