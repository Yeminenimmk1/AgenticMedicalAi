<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Agentic Medical AI</title>
    <meta name="description" content="Create your Digital Twin patient profile on the AgenticMed AI platform.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="antialiased min-h-screen relative flex flex-col items-center justify-center p-4">

    <div class="glass-premium p-8 rounded-2xl w-full max-w-lg my-8 animate-slide-up shadow-[0_0_50px_rgba(45,212,191,0.1)] relative overflow-hidden">

        <div class="absolute -top-10 -right-10 w-32 h-32 bg-teal-500/20 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-indigo-500/20 rounded-full blur-3xl"></div>

        <!-- Header -->
        <div class="flex justify-center mb-4 relative z-10">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-address-card text-white text-2xl"></i>
            </div>
        </div>
        <h2 class="text-2xl font-bold tracking-tight text-center mb-1 relative z-10 text-white">Digital Twin <span class="text-gradient">Creation</span></h2>
        <p class="text-slate-400 text-center mb-6 relative z-10 text-sm">Enroll your medical identity into the Agentic Medical AI core.</p>

        <form id="register-form" class="flex flex-col gap-4 relative z-10">

            <!-- Row 1: Username + Password -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-solid fa-user text-slate-500 text-sm"></i></div>
                        <input type="text" id="reg-username" required class="glass-input w-full pl-9 p-2.5 rounded-xl placeholder-slate-600 text-white text-sm focus:border-indigo-400 outline-none" placeholder="johndoe123">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-solid fa-lock text-slate-500 text-sm"></i></div>
                        <input type="password" id="reg-password" required class="glass-input w-full pl-9 p-2.5 rounded-xl placeholder-slate-600 text-white text-sm focus:border-indigo-400 outline-none" placeholder="••••••••">
                    </div>
                </div>
            </div>

            <!-- Row 2: Full Name -->
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Full Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-solid fa-id-card text-slate-500 text-sm"></i></div>
                    <input type="text" id="reg-fullname" required class="glass-input w-full pl-9 p-2.5 rounded-xl placeholder-slate-600 text-white text-sm focus:border-indigo-400 outline-none" placeholder="e.g. Emily Chen">
                </div>
            </div>

            <!-- Row 3: Email -->
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-solid fa-envelope text-slate-500 text-sm"></i></div>
                    <input type="email" id="reg-email" required class="glass-input w-full pl-9 p-2.5 rounded-xl placeholder-slate-600 text-white text-sm focus:border-indigo-400 outline-none" placeholder="emily@example.com">
                </div>
                <p class="text-[10px] text-slate-500 mt-1 ml-1">Used for AI triage results and doctor reply notifications.</p>
            </div>

            <!-- Row 4: Village / Area  -->
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Village / Area</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-solid fa-location-dot text-slate-500 text-sm"></i></div>
                    <input type="text" id="reg-village" class="glass-input w-full pl-9 p-2.5 rounded-xl placeholder-slate-600 text-white text-sm focus:border-indigo-400 outline-none" placeholder="e.g. Andheri, Mumbai">
                </div>
                <p class="text-[10px] text-slate-500 mt-1 ml-1">Used to match you with nearby doctors for consultation.</p>
            </div>

            <!-- Row 5: Age, Gender, Blood Group -->
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Age</label>
                    <input type="number" id="reg-age" required class="glass-input w-full p-2.5 rounded-xl placeholder-slate-600 text-white text-sm focus:border-indigo-400 outline-none" placeholder="e.g. 45" min="0" max="150">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Gender</label>
                    <select id="reg-gender" class="glass-input w-full p-2.5 rounded-xl text-white text-sm focus:border-indigo-400 outline-none">
                        <option value="Male" class="text-black">Male</option>
                        <option value="Female" class="text-black">Female</option>
                        <option value="Other" class="text-black">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Blood Gp</label>
                    <select id="reg-blood" class="glass-input w-full p-2.5 rounded-xl text-white text-sm focus:border-indigo-400 outline-none">
                        <option value="A+" class="text-black">A+</option>
                        <option value="A-" class="text-black">A-</option>
                        <option value="B+" class="text-black">B+</option>
                        <option value="B-" class="text-black">B-</option>
                        <option value="O+" class="text-black">O+</option>
                        <option value="O-" class="text-black">O-</option>
                        <option value="AB+" class="text-black">AB+</option>
                        <option value="AB-" class="text-black">AB-</option>
                        <option value="Unknown" class="text-black" selected>Unknown</option>
                    </select>
                </div>
            </div>

            <!-- Error Message -->
            <p id="error-msg" class="text-red-400 text-sm hidden font-medium text-center bg-red-500/10 py-2 px-3 rounded-lg border border-red-500/20">
                <i class="fa-solid fa-circle-exclamation mr-1"></i><span id="error-text">Registration failed</span>
            </p>

            <button type="submit" id="btn-register" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-indigo-500/20 active:scale-[0.98] mt-2">
                Initialize Digital Twin <i class="fa-solid fa-dna ml-2 opacity-80"></i>
            </button>

            <p class="text-center text-sm text-slate-400 mt-1">
                Already registered? <a href="login.html" class="text-indigo-400 hover:text-indigo-300 font-semibold underline decoration-indigo-500/30 underline-offset-4">Sign in securely</a>
            </p>
        </form>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('btn-register');
            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Saving to Postgres...';
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            const payload = {
                username:    document.getElementById('reg-username').value.trim(),
                password:    document.getElementById('reg-password').value,
                fullName:    document.getElementById('reg-fullname').value.trim(),
                email:       document.getElementById('reg-email').value.trim(),
                villageOrArea: document.getElementById('reg-village').value.trim(),
                age:         parseInt(document.getElementById('reg-age').value),
                gender:      document.getElementById('reg-gender').value,
                bloodGroup:  document.getElementById('reg-blood').value,
                role:        'PATIENT'
            };

            try {
                const res = await fetch('http://localhost:8081/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (res.ok) {
                    // Persist session state
                    localStorage.setItem('auth_username',   data.username);
                    localStorage.setItem('auth_role',       data.role    || 'PATIENT');
                    localStorage.setItem('auth_area',       data.villageOrArea || '');
                    localStorage.setItem('auth_fullname',   payload.fullName);
                    localStorage.setItem('auth_email',      payload.email);
                    window.location.href = 'index.html';
                } else {
                    errorText.textContent = data.message || 'Registration failed. Please try again.';
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorText.textContent = 'Connection failed. Is the Java backend running on port 8081?';
                errorMsg.classList.remove('hidden');
            } finally {
                btn.innerHTML = 'Initialize Digital Twin <i class="fa-solid fa-dna ml-2 opacity-80"></i>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
